name: Release (NPM + Docker)

on:
  push:
    branches:
      - main

permissions:
  contents: write   # release job may create tags/releases
  packages: write   # docker job pushes to GHCR
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to NPM and create GitHub release
        run: pnpx zardoy-release npm
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release version
        id: version
        run: |
          V=$(curl -sSf -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // empty')
          if [[ -z "$V" ]]; then
            echo "No release tag found, skipping Docker push"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          VER="${V#v}"
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=$V" >> $GITHUB_OUTPUT
          echo "Publish version: $VER ($V)"

      - name: Log into registry
        if: steps.version.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Docker image already exists
        id: exists
        if: steps.version.outputs.skip != 'true'
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          if docker manifest inspect "$IMG" 2>/dev/null; then
            echo "Image $IMG already in registry, skip push"
            echo "push=false" >> $GITHUB_OUTPUT
          else
            echo "push=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.version.outputs.skip != 'true' && steps.exists.outputs.push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: steps.version.outputs.skip != 'true' && steps.exists.outputs.push == 'true'
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        if: steps.version.outputs.skip != 'true' && steps.exists.outputs.push == 'true' && success()
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true
